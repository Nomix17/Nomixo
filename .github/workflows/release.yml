name: Build Release Assets

on:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - run: npm ci
      - name: Bundle mpv (Windows)
        shell: powershell
        run: |
          $release = Invoke-RestMethod "https://api.github.com/repos/zhongfly/mpv-winbuild/releases/latest"
          $asset = $release.assets | Where-Object { 
            $_.name -match "^mpv-x86_64-\d+" 
          } | Select-Object -First 1
          Invoke-WebRequest -Uri $asset.browser_download_url -OutFile mpv.7z
          7z x mpv.7z -o"mpv-extracted" -y
          New-Item -ItemType Directory -Force -Path "mpvBinary"
          Copy-Item (Get-ChildItem -Recurse -Filter "mpv.exe" "mpv-extracted" | Select-Object -First 1).FullName "mpvBinary/mpv.exe"

      - name: Build Windows targets
        run: npm run build -- --win --publish never

      - uses: actions/upload-artifact@v4
        with:
          name: windows-builds
          path: |
            dist/*.exe
            dist/*.zip

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - run: npm ci
      - name: Bundle mpv (Linux)
        run: |
          sudo apt-get update && sudo apt-get install -y mpv
          mkdir -p mpvBinary
          cp $(which mpv) mpvBinary/mpv
          chmod +x mpvBinary/mpv
      - name: Build Linux targets
        run: npm run build -- --linux --publish never

      - uses: actions/upload-artifact@v4
        with:
          name: linux-builds
          path: |
            dist/*.deb
            dist/*.rpm
            dist/*.tar.gz
            dist/*.AppImage

  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - run: npm ci
      - name: Bundle mpv (macOS)
        run: |
          brew install mpv
          mkdir -p mpvBinary
          cp $(which mpv) mpvBinary/mpv
          chmod +x mpvBinary/mpv
      - name: Build macOS targets
        run: npm run build -- --mac --publish never

      - uses: actions/upload-artifact@v4
        with:
          name: mac-builds
          path: dist/*.dmg

  attach-to-release:
    needs: [build-windows, build-linux, build-mac]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
