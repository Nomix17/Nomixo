<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Login</title>
    <link rel="icon" href="../../../assets/icons/logo.png" type="image/x-icon" />
    <script src="../../shared/sharedFuncs.js" defer></script>
    <script src="loginPage.js" defer></script>
    <link rel="stylesheet" href="../homePage/homePage.css" />
    <link rel="stylesheet" href="loginPage.css" />
    <link id="theme" rel="stylesheet" href="theme://theme.css" />
  </head>

  <body>
    <div id="div-main">
      <button id="btn-fullscreen" onclick="fullscreenClicked()" aria-label="Toggle fullscreen">
        <img id="img-fullscreen" />
      </button>

      <div id="div-middle">
        <div class="success-screen" id="view-success">
          <h1 id="welcome-title">Welcome</h1>
          <p id="welcome-msg"></p>
        </div>

        <!-- Card -->
        <div class="card" id="card">

          <!-- TMDB -->
          <div class="view" id="view-tmdb">
            <p class="step-counter">Step 1 of 2</p>
            <h1 class="title">Welcome to Nomixo</h1>
            <p class="subtitle">Enter your TMDB API key to continue</p>

            <label class="label" for="tmdb-key">API Key</label>
            <div class="input-wrap">
              <input type="password" id="tmdb-key" class="input"
                placeholder="Enter your API key"
                autocomplete="off" spellcheck="false"
                aria-label="TMDB API key" aria-describedby="tmdb-err" />
              <button class="eye-btn" data-target="tmdb-key" type="button" aria-label="Toggle visibility">
                <svg class="icon-show" viewBox="0 0 20 20" fill="none">
                  <path d="M10 4C5.5 4 2 10 2 10s3.5 6 8 6 8-6 8-6-3.5-6-8-6z" stroke="currentColor" stroke-width="1.5"/>
                  <circle cx="10" cy="10" r="2.5" stroke="currentColor" stroke-width="1.5"/>
                </svg>
                <svg class="icon-hide" viewBox="0 0 20 20" fill="none">
                  <path d="M3 3l14 14M10 4C5.5 4 2 10 2 10s1.2 2 3 3.5M17.5 7C18.5 8.3 18 10 18 10s-3.5 6-8 6c-1.5 0-2.9-.4-4-.9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                </svg>
              </button>
            </div>
            <p class="err" id="tmdb-err" role="alert"></p>

            <button class="btn" id="tmdb-submit" type="button">
              <span class="btn-label">Verify Key</span>
              <span class="spinner" aria-hidden="true"></span>
            </button>

            <p class="hint">Need an API key? <button class="link-btn" id="tmdb-get-key" type="button">Get one here</button></p>
          </div>

          <!-- Wyzie -->
          <div class="view view--hidden" id="view-wyzie">
            <p class="step-counter">Step 2 of 2</p>
            <h1 class="title">One more thing</h1>
            <p class="subtitle">Enter your Wyzie key to enable subtitles</p>

            <label class="label" for="wyzie-key">API Key</label>
            <div class="input-wrap">
              <input type="password" id="wyzie-key" class="input"
                placeholder="Enter your API key"
                autocomplete="off" spellcheck="false"
                aria-label="Wyzie API key" aria-describedby="wyzie-err" />
              <button class="eye-btn" data-target="wyzie-key" type="button" aria-label="Toggle visibility">
                <svg class="icon-show" viewBox="0 0 20 20" fill="none">
                  <path d="M10 4C5.5 4 2 10 2 10s3.5 6 8 6 8-6 8-6-3.5-6-8-6z" stroke="currentColor" stroke-width="1.5"/>
                  <circle cx="10" cy="10" r="2.5" stroke="currentColor" stroke-width="1.5"/>
                </svg>
                <svg class="icon-hide" viewBox="0 0 20 20" fill="none">
                  <path d="M3 3l14 14M10 4C5.5 4 2 10 2 10s1.2 2 3 3.5M17.5 7C18.5 8.3 18 10 18 10s-3.5 6-8 6c-1.5 0-2.9-.4-4-.9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                </svg>
              </button>
            </div>
            <p class="err" id="wyzie-err" role="alert"></p>

            <div class="btn-bottom-div-layout">
              <button class="btn" id="wyzie-submit" type="button">
                <span class="btn-label">
                  Verify Key
                </span>
                <span class="spinner" aria-hidden="true"></span>
              </button>

              <button class="skip-btn" id="wyzie-skip" type="button">
                Skip
              </button>
            </div>
            <p class="hint">Need a key? <button class="link-btn" id="wyzie-get-key" type="button">Redeem from Wyzie</button></p>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
